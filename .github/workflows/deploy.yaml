name: Blog Deploy
on:
  push:
    branches: ['main']
    paths:
      - 'index.html'
      - 'e404.html'
      - 'httpd.conf'
      - 'css/style.css'
      - 'posts/**'
      - 'my-book-recommendations.html'
      - 'scripts/generate-rss.js'
      - 'scripts/generate-sitemap.js'
      - 'scripts/sitemap.js'
      - 'scripts/seo-utils.js'
      - 'scripts/rss.js'
      - 'Dockerfile'
      - '.dockerignore'
      - '.github/workflows/deploy.yaml'
  workflow_dispatch:
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Generate RSS feed
        run: node scripts/generate-rss.js

      - name: Generate sitemap
        run: node scripts/generate-sitemap.js

      - name: Minify CSS for production
        run: node scripts/minify-css.js

      - name: Deploy with Quave Cloud CLI
        uses: zcloud-ws/zcloud-deploy-action@main
        with:
          env-token: ${{ secrets.QUAVE_CLOUD_ENV_TOKEN }}
          env: "joaovictornsv-blog-production"
