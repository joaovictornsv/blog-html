name: Blog Deploy
on:
  push:
    branches: ['main']
    paths:
      - 'index.html'
      - 'favicon.ico'
      - 'e404.html'
      - 'httpd.conf'
      - 'css/**'
      - 'posts/**'
      - 'devlog/**'
      - 'links/**'
      - 'scripts/generate-rss.js'
      - 'scripts/generate-devlog-rss.js'
      - 'scripts/generate-sitemap.js'
      - 'scripts/sitemap.js'
      - 'scripts/seo-utils.js'
      - 'scripts/rss.js'
      - 'scripts/generate-og-images.js'
      - 'scripts/og-utils.js'
      - 'scripts/og-template.js'
      - 'scripts/fonts/**'
      - 'package.json'
      - 'package-lock.json'
      - 'Dockerfile'
      - '.dockerignore'
      - '.github/workflows/deploy.yaml'
  workflow_dispatch:
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate OG images
        run: node scripts/generate-og-images.js

      - name: Generate RSS feeds
        run: |
          node scripts/generate-rss.js
          node scripts/generate-devlog-rss.js

      - name: Generate sitemap
        run: node scripts/generate-sitemap.js

      - name: Minify CSS for production
        run: node scripts/minify-css.js

      - name: Deploy with Quave Cloud CLI
        uses: zcloud-ws/zcloud-deploy-action@main
        with:
          env-token: ${{ secrets.QUAVE_CLOUD_ENV_TOKEN }}
          env: "joaovictornsv-blog-production"
